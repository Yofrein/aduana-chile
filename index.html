// ─── QR helpers ──────────────────────────────────────────────────────────────
const QR_BASE = "https://api.qrserver.com/v1/create-qr-code";
const qrUrl = (data, size = 160) =>
  `${QR_BASE}/?size=${size}x${size}&data=${encodeURIComponent(data)}`;

const descargarQR = async (data, nombre) => {
  try {
    const res = await fetch(qrUrl(data, 300));
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `${nombre}.png`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  } catch {
    alert("No se pudo descargar. Haz clic derecho sobre el QR para guardarlo.");
  }
};

// ─── RUT formatter ───────────────────────────────────────────────────────────
const formatRut = (v) => {
  const raw = v.replace(/[^0-9kK]/g, "");
  if (raw.length <= 1) return raw;
  const body = raw.slice(0, -1).slice(0, 8);
  const dv = raw.slice(-1).toUpperCase();
  let fmt = ""; let i = body.length;
  while (i > 0) {
    const blk = body.substring(Math.max(0, i - 3), i);
    fmt = blk + (fmt ? "." + fmt : ""); i -= 3;
  }
  return `${fmt}-${dv}`;
};

          Nueva solicitud
        </button>
      </div>
    </div>
  );
}

// ─── Modal wrapper ────────────────────────────────────────────────────────────
function Modal({ onClose, title, accentColor = "blue", children }) {
  useEffect(() => {
    const esc = (e) => e.key === "Escape" && onClose();
    window.addEventListener("keydown", esc);
    return () => window.removeEventListener("keydown", esc);
  }, [onClose]);

  const colors = {
    blue:   { header: "bg-blue-900",   ring: "focus:ring-blue-400" },
    green:  { header: "bg-green-800",  ring: "focus:ring-green-400" },
    purple: { header: "bg-purple-800", ring: "focus:ring-purple-400" },
  };
  const c = colors[accentColor] || colors.blue;

  return (
    <div className="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
      <div className="modal-card bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto"
        onClick={e => e.stopPropagation()}>
        <div className={`${c.header} text-white px-7 py-5 rounded-t-3xl flex items-center justify-between sticky top-0 z-10`}>
          <h2 className="font-bold text-xl">{title}</h2>
          <button onClick={onClose}
            className="w-8 h-8 rounded-full bg-white/20 hover:bg-white/40 inline-flex items-center justify-center text-lg transition font-bold leading-none">
            ×
          </button>
        </div>
        <div className="p-7">{children}</div>
      </div>
    </div>
  );
}

                <input name="rutPropietario" value={autoData.rutPropietario} onChange={mkChange(setAutoData)} placeholder="12.345.678-9" className={inp} required />
              </Field>
              <Field label="Marca">
                <input name="marca" value={autoData.marca} onChange={mkChange(setAutoData)} placeholder="Toyota" className={inp} required />
              </Field>
              <Field label="Modelo">
                <input name="modelo" value={autoData.modelo} onChange={mkChange(setAutoData)} placeholder="RAV4" className={inp} required />
              </Field>
              <Field label="Patente">
                <input name="patenteAuto" value={autoData.patenteAuto} onChange={mkChange(setAutoData)} placeholder="ABCD-12" className={`${inp} uppercase`} required />
              </Field>
              <Field label="Año">
                <input name="anio" type="number" value={autoData.anio} onChange={mkChange(setAutoData)} placeholder="2022" className={inp} required />
              </Field>
              <div className="col-span-2">
                <Field label="Seguro Internacional Obligatorio (RCA)">
                  <select name="seguroInternacional" value={autoData.seguroInternacional} onChange={mkChange(setAutoData)} className={`${inp} bg-white`}>
                    <option value="si">Sí, vigente para el país de destino</option>
                    <option value="no">No — regularizar en aduana</option>
                  </select>
                </Field>
              </div>
              <div className="col-span-2 flex gap-3 mt-2">
                <button type="submit" className="flex-1 bg-blue-900 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl text-sm shadow transition">Validar y Registrar</button>
                <button type="button" onClick={() => setModal(null)} className="px-4 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl text-sm transition">Cancelar</button>
              </div>
            </form>
          ) : (
            <ComprobanteQR id={autoComp} qrData={autoData.patenteAuto.toUpperCase()}
              detalles={[
                {label:"Propietario", valor:autoData.propietario},
                {label:"Vehículo",    valor:`${autoData.marca} ${autoData.modelo} (${autoData.anio})`},
                {label:"Patente",     valor:autoData.patenteAuto.toUpperCase()},
                {label:"Seguro RCA",  valor:autoData.seguroInternacional==="si"?"Vigente":"Regularizar en aduana"},
              ]}
              onVolver={() => setModal(null)} />
          )}
        </Modal>
      )}

      {modal === "sag" && (
        <Modal title="🌱 Declaración Jurada SAG-Aduanas" accentColor="green" onClose={() => setModal(null)}>
          {!sagComp ? (
            <form onSubmit={handleSagSubmit} className="space-y-4">
              <p className="text-sm text-slate-500">Declara si portas productos de origen vegetal o animal. La omisión puede resultar en multas de hasta 10 UTM (Ley SAG N°18.755).</p>
              <div className="grid md:grid-cols-2 gap-4">
                <Field label="Nombre del declarante">
                  <input name="nombreDeclarante" value={sagData.nombreDeclarante} onChange={mkChange(setSagData)} placeholder="Nombre completo" className={inp} required />
                </Field>
                <Field label="RUT o Pasaporte">
                  <input name="rutDeclarante" value={sagData.rutDeclarante} onChange={mkChange(setSagData)} placeholder="12.345.678-9" className={inp} required />
                </Field>
                <div className="md:col-span-2">
                  <Field label="País de procedencia">
                    <input name="paisProcedencia" value={sagData.paisProcedencia} onChange={mkChange(setSagData)} placeholder="Ej: Argentina" className={inp} required />
                  </Field>
                </div>
              </div>
              <div className="mt-2">
                <p className="text-xs font-bold text-slate-500 uppercase tracking-wide mb-3">¿Porta alguno de estos productos?</p>
                <div className="space-y-2">
                  {[
                    {name:"portaVegetal",  label:"🌿 Productos vegetales (frutas, verduras, semillas, plantas, madera)"},
                    {name:"portaAnimal",   label:"🐄 Productos animales (carnes, embutidos, lácteos, huevos, cueros)"},
                    {name:"portaAlimentos",label:"🍱 Alimentos elaborados o en conserva no declarados comercialmente"},
                  ].map(it => (
                    <div key={it.name} className="flex items-center justify-between bg-slate-50 rounded-xl p-3 border border-slate-200">
                      <span className="text-xs text-slate-700 flex-1 mr-3">{it.label}</span>
                      <select name={it.name} value={sagData[it.name]} onChange={mkChange(setSagData)}
                        className="p-2 text-xs rounded-lg border border-slate-300 bg-white focus:outline-none focus:border-green-600">
                        <option value="no">No porta</option>
                        <option value="si">Sí porta</option>
                      </select>
                    </div>
                  ))}
                </div>
              </div>
              {(sagData.portaVegetal==="si"||sagData.portaAnimal==="si"||sagData.portaAlimentos==="si") && (
                <div className="modal-fade-in">
                  <Field label="Descripción de productos declarados">
                    <textarea name="descripcionProductos" value={sagData.descripcionProductos} onChange={mkChange(setSagData)}
                      placeholder="Tipo, cantidad aproximada y país de origen de cada producto..."
                      rows="3" className={`${inp} bg-orange-50 border-orange-300 focus:border-orange-500`} />
                  </Field>
                  <p className="text-xs text-orange-600 mt-1">⚠️ Estos productos serán sujetos a revisión fitosanitaria en frontera.</p>
                </div>
              )}
              <div className="bg-green-50 border border-green-200 rounded-xl p-3 text-xs text-green-800">
                <strong>Declaración Jurada:</strong> Declaro que la información ingresada es verídica y completa.
              </div>
              <div className="flex gap-3 mt-2">
                <button type="submit" className="flex-1 bg-green-700 hover:bg-green-800 text-white font-semibold py-3 rounded-xl text-sm transition">Firmar y Enviar</button>
                <button type="button" onClick={() => setModal(null)} className="px-4 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl text-sm transition">Cancelar</button>
              </div>
            </form>
          ) : (
            <ComprobanteQR id={sagComp} qrData={sagComp}
              detalles={[
                {label:"Declarante",  valor:sagData.nombreDeclarante},
                {label:"RUT",         valor:sagData.rutDeclarante},
                {label:"País origen", valor:sagData.paisProcedencia},
                {label:"Productos",   valor:(sagData.portaVegetal==="si"||sagData.portaAnimal==="si"||sagData.portaAlimentos==="si")?"Declarados — sujeto a revisión":"Ninguno"},
              ]}
              onVolver={() => setModal(null)} />
          )}
        </Modal>
      )}

      {/* ── Modal Menores: compacto, sin scroll ── */}
      {modal === "menores" && (
        <Modal title="📄 Permiso de Viaje — Menor de Edad" accentColor="purple" onClose={() => setModal(null)}>
          {!menComp ? (
            <form onSubmit={handleMenSubmit} className="space-y-3">
              <p className="text-sm text-slate-500">Adjunta la autorización notarial para validación electrónica con PDI.</p>

              {/* Menor + Autorizante en dos columnas compactas */}
              <div className="grid grid-cols-2 gap-3">
                <div className="col-span-2">
                  <p className="text-xs font-bold text-purple-800 uppercase tracking-wide mb-2">Datos del Menor</p>
                </div>
                <Field label="Nombre del menor">
                  <input name="nombreMenor" value={menData.nombreMenor} onChange={mkChange(setMenData)} placeholder="Nombre completo" className={`${inp} py-2`} required />
                </Field>
                <Field label="RUT del menor">
                  <input name="rutMenor" value={menData.rutMenor} onChange={mkChange(setMenData)} placeholder="12.345.678-9" className={`${inp} py-2`} required />
                </Field>
                <Field label="Fecha de nacimiento">
                  <input type="date" name="fechaNacimiento" value={menData.fechaNacimiento} onChange={mkChange(setMenData)} className={`${inp} py-2`} />
                </Field>
                <Field label="Destino del viaje">
                  <input name="destinoViaje" value={menData.destinoViaje} onChange={mkChange(setMenData)} placeholder="País / Ciudad" className={`${inp} py-2`} />
                </Field>

                <div className="col-span-2 pt-1">
                  <p className="text-xs font-bold text-purple-800 uppercase tracking-wide mb-2">Datos del Adulto Autorizante</p>
                </div>
                <Field label="Nombre padre/madre/tutor">
                  <input name="nombreAutorizante" value={menData.nombreAutorizante} onChange={mkChange(setMenData)} placeholder="Nombre completo" className={`${inp} py-2`} required />
                </Field>
                <Field label="RUT del autorizante">
                  <input name="rutAutorizante" value={menData.rutAutorizante} onChange={mkChange(setMenData)} placeholder="12.345.678-9" className={`${inp} py-2`} required />
                </Field>
                <div className="col-span-2">
                  <Field label="Relación con el menor">
                    <select name="relacionMenor" value={menData.relacionMenor} onChange={mkChange(setMenData)} className={`${inp} py-2 bg-white`}>
                      <option value="">Seleccione</option>
                      <option>Padre / Madre</option>
                      <option>Tutor Legal</option>
                      <option>Abuelo/a</option>
                      <option>Otro familiar autorizado</option>
                    </select>
                  </Field>
                </div>
              </div>

              {/* Upload compacto */}
              <div>
                <label className="text-xs font-bold text-slate-500 uppercase tracking-wide block mb-1">Documento Notarial (obligatorio)</label>
                <label className="border-2 border-dashed border-purple-300 hover:border-purple-600 rounded-xl p-3 text-center cursor-pointer flex items-center justify-center gap-3 bg-purple-50 transition">
                  <input type="file" accept=".pdf,image/*" className="hidden"
                    onChange={e => e.target.files?.[0] && setMenData(p => ({...p, documentoNotarial:e.target.files[0].name}))} />
                  <span className="text-xl">📎</span>
                  <div className="text-left">
                    <p className="text-xs font-semibold text-purple-800">
                      {menData.documentoNotarial ? `✓ ${menData.documentoNotarial}` : "Haz clic para subir el documento notarial"}
                    </p>
                    <p className="text-xs text-slate-400">PDF, JPG o PNG — Máx. 10 MB</p>
                  </div>
                </label>
              </div>

              <div className="bg-purple-50 border border-purple-200 rounded-xl p-3 text-xs text-purple-800">
                <strong>Aviso PDI:</strong> El documento será validado electrónicamente en frontera.
              </div>
              <div className="flex gap-3">
                <button type="submit" className="flex-1 bg-purple-700 hover:bg-purple-800 text-white font-semibold py-2.5 rounded-xl text-sm transition">Enviar para Validación</button>
                <button type="button" onClick={() => setModal(null)} className="px-4 bg-slate-200 hover:bg-slate-300 text-slate-700 rounded-xl text-sm transition">Cancelar</button>
              </div>
            </form>
          ) : (
            <ComprobanteQR id={menComp} qrData={menComp}
              detalles={[
                {label:"Menor",       valor:menData.nombreMenor},
                {label:"RUT Menor",   valor:menData.rutMenor},
                {label:"Destino",     valor:menData.destinoViaje||"No especificado"},
                {label:"Autorizante", valor:`${menData.nombreAutorizante} (${menData.relacionMenor||"Tutor"})`},
                {label:"Documento",   valor:`✓ ${menData.documentoNotarial}`},
              ]}
              onVolver={() => setModal(null)} />
          )}
        </Modal>
      )}

      <footer className="bg-blue-950 text-white text-center py-6 mt-12">
        <p className="text-sm opacity-70">Prototipo Académico · Ingeniería de Software · DuocUC</p>
      </footer>
    </div>
  );
}

// ─── Toast component ──────────────────────────────────────────────────────────
const TIPS = [
  { icon:"⚡", msg:"Tip: registra tu vehículo antes de llegar y ahorra hasta 2 hrs de espera." },
  { icon:"🌿", msg:"Recuerda declarar productos SAG — omitirlo tiene multa de hasta 10 UTM." },
  { icon:"📱", msg:"Guarda tu QR en la pantalla de bloqueo para mostrarlo sin desbloquear." },
  { icon:"👶", msg:"¿Viajás con menores? Sube el permiso notarial antes de llegar a frontera." },
];

function Toast() {
  const [visible, setVisible] = useState(false);
  const [leaving, setLeaving] = useState(false);
  const [tip] = useState(() => TIPS[Math.floor(Math.random() * TIPS.length)]);

  useEffect(() => {
    const show = setTimeout(() => setVisible(true), 1200);
    const hide = setTimeout(() => {
      setLeaving(true);
      setTimeout(() => setVisible(false), 300);
    }, 5200);
    return () => { clearTimeout(show); clearTimeout(hide); };
  }, []);

  if (!visible) return null;
  return (
    <div className={`toast${leaving ? " out" : ""}`}>
      <span>{tip.icon}</span>
      <span>{tip.msg}</span>
      <button onClick={() => { setLeaving(true); setTimeout(() => setVisible(false), 300); }}
        style={{marginLeft:8, opacity:.6, background:"none", border:"none", color:"white", fontSize:16, cursor:"pointer", display:"inline-flex", alignItems:"center", justifyContent:"center"}}>
        ×
      </button>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(AduanasPrototype)
);
  </script>
</body>
</html>
