const TIPS = [
  { icon:"⚡", msg:"Tip: registra tu vehículo antes de llegar y ahorra hasta 2 hrs de espera." },
  { icon:"🌿", msg:"Recuerda declarar productos SAG — omitirlo tiene multa de hasta 10 UTM." },
  { icon:"📱", msg:"Guarda tu QR en la pantalla de bloqueo para mostrarlo sin desbloquear." },
  { icon:"👶", msg:"¿Viajás con menores? Sube el permiso notarial antes de llegar a frontera." },
];

function Toast() {
  const [visible, setVisible] = useState(false);
  const [leaving, setLeaving] = useState(false);
  const [tip] = useState(() => TIPS[Math.floor(Math.random() * TIPS.length)]);

  useEffect(() => {
    const show = setTimeout(() => setVisible(true), 1200);
    const hide = setTimeout(() => {
      setLeaving(true);
      setTimeout(() => setVisible(false), 300);
    }, 5200);
    return () => { clearTimeout(show); clearTimeout(hide); };
  }, []);

  if (!visible) return null;
  return (
    <div className={`toast${leaving ? " out" : """}`}>
      <span>{tip.icon}</span>
      <span>{tip.msg}</span>
      <button onClick={() => { setLeaving(true); setTimeout(() => setVisible(false), 300); }}
        style={{marginLeft:8, opacity:.6, background:"none", border:"none", color:"white", fontSize:16, cursor:"pointer", display:"inline-flex", alignItems:37, justifyContent:"center"}}>×</button>
    </div>
  );
}

function App() {
  const [step, setStep] = useState('home');
  const [rut, setRut] = useState('');
  const [loading, setLoading] = useState(false);
  const [qrBlob, setQrBlob] = useState(null);
  const [countdown, setCountdown] = useState(30);
  const [audioPlayed, setAudioPlayed] = useState(false);
  const [toastKey, setToastKey] = useState(0);

  // ESTADO PARA EL MODO OSCURO
  const [darkMode, setDarkMode] = useState(() => {
    return localStorage.getItem('theme') === 'dark';
  });

  // Efecto para aplicar/remover la clase 'dark' del documento
  useEffect(() => {
    if (darkMode) {
      document.documentElement.classList.add('dark');
      localStorage.setItem('theme', 'dark');
    } else {
      document.documentElement.classList.remove('dark');
      localStorage.setItem('theme', 'light');
    }
  }, [darkMode]);

  const handleToggleTheme = () => {
    setDarkMode(!darkMode);
  };

  const handleLogin = (e) => {
    e.preventDefault();
    if (!rut) return;
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setStep('dashboard');
      setToastKey(prev => prev + 1);
    }, 900);
  };

  const handleLogout = () => {
    setStep('home');
    setRut('');
    setQrBlob(null);
    setAudioPlayed(false);
  };

  return (
    // Agregamos clases condicionales para alternar el fondo completo en modo claro/oscuro
    <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 transition-colors duration-300 flex flex-col font-sans">
      
      {/* HEADER / NAVBAR OPTIMIZADO */}
      <header className="bg-white dark:bg-slate-800 shadow-sm border-b border-slate-200 dark:border-slate-700 transition-colors duration-300">
        <div className="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
          
          {/* Logo / Título */}
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md shadow-blue-200 dark:shadow-none">
              A
            </div>
            <div>
              <h1 className="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Aduana Chile</h1>
              <p className="text-xs text-slate-500 dark:text-slate-400">Paso Los Libertadores</p>
            </div>
          </div>

          {/* Selector de Modo Oscuro y Botón de Cerrar Sesión Distribuido */}
          <div className="flex items-center gap-3 w-full sm:w-auto justify-end">
            
            {/* Botón Sol / Luna para Modo Oscuro */}
            <button 
              onClick={handleToggleTheme}
              className="p-2 rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-xl transition-colors duration-200 focus:outline-none"
              title={darkMode ? "Activar modo claro" : "Activar modo oscuro"}
            >
              {darkMode ? "☀️" : "🌙"}
            </button>

            {/* El botón de Cerrar Sesión ahora es completamente adaptativo para celulares */}

              <button 
                onClick={handleLogout}

              >
                Cerrar sesión
              </button>

          </div>

        </div>
      </header>

      {/* MAIN CONTAINER */}

          <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-xl shadow-slate-100 dark:shadow-none border border-slate-100 dark:border-slate-700 transition-colors duration-300">
            <div className="mb-6 text-center">
              <h2 className="text-2xl font-bold text-slate-900 dark:text-white mb-2">Bienvenido</h2>

              <button

          to { transform: translateY(100%) scale(0.9); opacity: 0; }
        }
      `}</style>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
